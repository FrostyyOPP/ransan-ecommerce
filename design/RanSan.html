<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RanSan® — Streetwear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #F2EFE8; }
  @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-25%); } }
  button { font-family: inherit; }
  /* switcher */
  .rs-switcher {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: #0a0a0a; color: #F2EFE8;
    display: flex; gap: 2px; padding: 4px;
    border: 1px solid #0a0a0a;
    font-family: "Space Mono", monospace; font-size: 10px; letter-spacing: 0.15em;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
  }
  .rs-switcher button {
    background: transparent; color: inherit; border: none;
    padding: 8px 12px; cursor: pointer; font: inherit; letter-spacing: inherit;
  }
  .rs-switcher button.active { background: #E8F249; color: #0a0a0a; }
  .rs-switcher button:hover:not(.active) { background: #222; }

  /* tweaks panel */
  .rs-tweaks {
    position: fixed; bottom: 80px; right: 20px; z-index: 100;
    width: 280px;
    background: #F2EFE8; border: 1px solid #0a0a0a;
    font-family: "Space Mono", monospace; font-size: 11px; letter-spacing: 0.05em;
  }
  .rs-tweaks h4 { margin: 0; padding: 14px 16px; background: #0a0a0a; color: #F2EFE8; font-family: "Archivo Black", sans-serif; font-size: 12px; letter-spacing: 0.15em; display: flex; justify-content: space-between; }
  .rs-tweaks .group { padding: 14px 16px; border-bottom: 1px solid #0a0a0a; }
  .rs-tweaks .group:last-child { border-bottom: none; }
  .rs-tweaks label { display: block; margin-bottom: 6px; color: #6B6B68; font-size: 9px; letter-spacing: 0.15em; }
  .rs-tweaks .swatches { display: flex; gap: 6px; }
  .rs-tweaks .sw { width: 26px; height: 26px; border: 1px solid #0a0a0a; cursor: pointer; }
  .rs-tweaks .sw.active { outline: 2px solid #0a0a0a; outline-offset: 2px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="hifi/rs-kit.jsx"></script>
<script type="text/babel" src="hifi/hifi-home.jsx"></script>
<script type="text/babel" src="hifi/hifi-plp.jsx"></script>
<script type="text/babel" src="hifi/hifi-pdp.jsx"></script>
<script type="text/babel" src="hifi/hifi-cart-checkout.jsx"></script>
<script type="text/babel" src="hifi/hifi-rest.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "acid",
  "startScreen": "home"
}/*EDITMODE-END*/;

const SCREENS = [
  ['home', 'HOME', HifiHome],
  ['plp', 'SHOP', HifiPLP],
  ['pdp', 'PDP', HifiPDP],
  ['cart', 'CART', HifiCart],
  ['checkout', 'CHECKOUT', HifiCheckout],
  ['auth', 'LOGIN', HifiAuth],
  ['search', 'SEARCH', HifiSearch],
  ['about', 'ABOUT', HifiAbout],
  ['admin', 'ADMIN', HifiAdmin],
];

const ACCENT_MAP = {
  acid: '#E8F249',
  red: '#D92D1F',
  blue: '#2a5e8b',
  green: '#2F7D3E',
};

const App = () => {
  const saved = localStorage.getItem('rs-screen');
  const [screen, setScreen] = React.useState(saved && SCREENS.find(s => s[0] === saved) ? saved : TWEAK_DEFAULTS.startScreen);
  const [accent, setAccent] = React.useState(TWEAK_DEFAULTS.accent);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('rs-screen', screen); }, [screen]);

  // apply accent via CSS var override on the root
  React.useEffect(() => {
    document.documentElement.style.setProperty('--rs-accent', ACCENT_MAP[accent] || ACCENT_MAP.acid);
  }, [accent]);

  // Tweaks host integration
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') { setEditMode(true); setTweaksOpen(true); }
      if (e.data?.type === '__deactivate_edit_mode') { setEditMode(false); setTweaksOpen(false); }
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const Cur = SCREENS.find(s => s[0] === screen)?.[2] || HifiHome;

  return (
    <>
      <Cur />

      {/* screen switcher */}
      <div className="rs-switcher">
        {SCREENS.map(([k, l]) =>
          <button key={k} className={screen === k ? 'active' : ''} onClick={() => setScreen(k)}>{l}</button>
        )}
      </div>

      {/* tweaks panel */}
      {editMode && tweaksOpen && (
        <div className="rs-tweaks">
          <h4>TWEAKS <span style={{ cursor: 'pointer' }} onClick={() => setTweaksOpen(false)}>×</span></h4>
          <div className="group">
            <label>ACCENT COLOR</label>
            <div className="swatches">
              {Object.entries(ACCENT_MAP).map(([k, v]) =>
                <div key={k} className={`sw ${accent === k ? 'active' : ''}`} style={{ background: v }} onClick={() => {
                  setAccent(k);
                  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: k } }, '*');
                }} />
              )}
            </div>
          </div>
          <div className="group">
            <label>CURRENT SCREEN</label>
            <select value={screen} onChange={e => setScreen(e.target.value)} style={{ width: '100%', padding: 6, fontFamily: 'inherit', fontSize: 11 }}>
              {SCREENS.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
            </select>
          </div>
          <div className="group" style={{ color: '#6B6B68', fontSize: 10, lineHeight: 1.6 }}>
            Accent color applies to hero highlights and UI accents. Toggle screens via the bottom switcher or here.
          </div>
        </div>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
